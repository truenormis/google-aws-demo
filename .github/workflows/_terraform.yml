name: Terraform

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      workspace:
        required: true
        type: string
      tfvars:
        required: true
        type: string
      aws_region:
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ZONE_ID:
        required: true
    outputs:
      cluster_name:
        value: ${{ jobs.terraform.outputs.cluster_name }}
      aws_region:
        value: ${{ jobs.terraform.outputs.aws_region }}
      vpc_id:
        value: ${{ jobs.terraform.outputs.vpc_id }}
      lb_controller_role_arn:
        value: ${{ jobs.terraform.outputs.lb_controller_role_arn }}
      acm_certificate_arn:
        value: ${{ jobs.terraform.outputs.acm_certificate_arn }}
      origin_acm_certificate_arn:
        value: ${{ jobs.terraform.outputs.origin_acm_certificate_arn }}
      ecr_frontend_url:
        value: ${{ jobs.terraform.outputs.ecr_frontend_url }}
      ecr_productcatalogservice_url:
        value: ${{ jobs.terraform.outputs.ecr_productcatalogservice_url }}
      ecr_currencyservice_url:
        value: ${{ jobs.terraform.outputs.ecr_currencyservice_url }}
      amp_endpoint:
        value: ${{ jobs.terraform.outputs.amp_endpoint }}
      otel_collector_role_arn:
        value: ${{ jobs.terraform.outputs.otel_collector_role_arn }}
      grafana_endpoint:
        value: ${{ jobs.terraform.outputs.grafana_endpoint }}
      grafana_api_token:
        value: ${{ jobs.terraform.outputs.grafana_api_token }}
      elasticache_endpoint:
        value: ${{ jobs.terraform.outputs.elasticache_endpoint }}

jobs:
  terraform:
    name: "Terraform (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      cluster_name: ${{ steps.tf.outputs.cluster_name }}
      aws_region: ${{ steps.tf.outputs.aws_region }}
      vpc_id: ${{ steps.tf.outputs.vpc_id }}
      lb_controller_role_arn: ${{ steps.tf.outputs.lb_controller_role_arn }}
      acm_certificate_arn: ${{ steps.tf.outputs.acm_certificate_arn }}
      origin_acm_certificate_arn: ${{ steps.tf.outputs.origin_acm_certificate_arn }}
      ecr_frontend_url: ${{ steps.tf.outputs.ecr_frontend_url }}
      ecr_productcatalogservice_url: ${{ steps.tf.outputs.ecr_productcatalogservice_url }}
      ecr_currencyservice_url: ${{ steps.tf.outputs.ecr_currencyservice_url }}
      amp_endpoint: ${{ steps.tf.outputs.amp_endpoint }}
      otel_collector_role_arn: ${{ steps.tf.outputs.otel_collector_role_arn }}
      grafana_endpoint: ${{ steps.tf.outputs.grafana_endpoint }}
      grafana_api_token: ${{ steps.tf.outputs.grafana_api_token }}
      elasticache_endpoint: ${{ steps.tf.outputs.elasticache_endpoint }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init & Apply
        working-directory: terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          terraform init
          terraform workspace select ${{ inputs.workspace }} || terraform workspace new ${{ inputs.workspace }}
          terraform apply -auto-approve -var-file=${{ inputs.tfvars }}

      - name: Export outputs
        id: tf
        working-directory: terraform
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"
          echo "aws_region=$(terraform output -raw aws_region)" >> "$GITHUB_OUTPUT"
          echo "vpc_id=$(terraform output -raw vpc_id)" >> "$GITHUB_OUTPUT"
          echo "lb_controller_role_arn=$(terraform output -raw aws_lb_controller_role_arn)" >> "$GITHUB_OUTPUT"
          echo "acm_certificate_arn=$(terraform output -raw acm_certificate_arn)" >> "$GITHUB_OUTPUT"
          echo "origin_acm_certificate_arn=$(terraform output -raw origin_acm_certificate_arn)" >> "$GITHUB_OUTPUT"
          echo "ecr_frontend_url=$(terraform output -raw ecr_frontend_url)" >> "$GITHUB_OUTPUT"
          echo "ecr_productcatalogservice_url=$(terraform output -raw ecr_productcatalogservice_url)" >> "$GITHUB_OUTPUT"
          echo "ecr_currencyservice_url=$(terraform output -raw ecr_currencyservice_url)" >> "$GITHUB_OUTPUT"
          echo "amp_endpoint=$(terraform output -raw amp_workspace_endpoint)" >> "$GITHUB_OUTPUT"
          echo "otel_collector_role_arn=$(terraform output -raw otel_collector_role_arn)" >> "$GITHUB_OUTPUT"
          echo "grafana_endpoint=$(terraform output -raw grafana_workspace_endpoint)" >> "$GITHUB_OUTPUT"
          echo "grafana_api_token=$(terraform output -raw grafana_api_token)" >> "$GITHUB_OUTPUT"
          echo "elasticache_endpoint=$(terraform output -raw elasticache_endpoint)" >> "$GITHUB_OUTPUT"
