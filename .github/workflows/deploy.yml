name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "k8s/**"
      - "terraform/**"
      - "src/frontend/**"
      - "src/productcatalogservice/**"
      - "src/currencyservice/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        type: choice
        options: [staging, production]
        default: staging

env:
  AWS_REGION: eu-central-1

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # STAGING
  # ---------------------------------------------------------------------------
  terraform-staging:
    uses: ./.github/workflows/_terraform.yml
    with:
      environment: staging
      workspace: staging
      tfvars: envs/staging.tfvars
      aws_region: eu-central-1
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

  build-frontend:
    needs: terraform-staging
    uses: ./.github/workflows/_build-image.yml
    with:
      context: ./src/frontend
      ecr_url: ${{ needs.terraform-staging.outputs.ecr_frontend_url }}
      aws_region: eu-central-1
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  build-productcatalogservice:
    needs: terraform-staging
    uses: ./.github/workflows/_build-image.yml
    with:
      context: ./src/productcatalogservice
      ecr_url: ${{ needs.terraform-staging.outputs.ecr_productcatalogservice_url }}
      cache_scope: productcatalogservice
      aws_region: eu-central-1
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  build-currencyservice:
    needs: terraform-staging
    uses: ./.github/workflows/_build-image.yml
    with:
      context: ./src/currencyservice
      ecr_url: ${{ needs.terraform-staging.outputs.ecr_currencyservice_url }}
      cache_scope: currencyservice
      aws_region: eu-central-1
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  deploy-staging:
    needs: [terraform-staging, build-frontend, build-productcatalogservice, build-currencyservice]
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: staging
      aws_region: eu-central-1
      cluster_name: ${{ needs.terraform-staging.outputs.cluster_name }}
      vpc_id: ${{ needs.terraform-staging.outputs.vpc_id }}
      lb_controller_role_arn: ${{ needs.terraform-staging.outputs.lb_controller_role_arn }}
      origin_acm_certificate_arn: ${{ needs.terraform-staging.outputs.origin_acm_certificate_arn }}
      hostname: origin-staging.shop.whiteforge.ai
      ecr_frontend_url: ${{ needs.terraform-staging.outputs.ecr_frontend_url }}
      frontend_image_tag: ${{ needs.build-frontend.outputs.image_tag }}
      ecr_productcatalogservice_url: ${{ needs.terraform-staging.outputs.ecr_productcatalogservice_url }}
      productcatalogservice_image_tag: ${{ needs.build-productcatalogservice.outputs.image_tag }}
      ecr_currencyservice_url: ${{ needs.terraform-staging.outputs.ecr_currencyservice_url }}
      currencyservice_image_tag: ${{ needs.build-currencyservice.outputs.image_tag }}
      amp_endpoint: ${{ needs.terraform-staging.outputs.amp_endpoint }}
      otel_collector_role_arn: ${{ needs.terraform-staging.outputs.otel_collector_role_arn }}
      grafana_endpoint: ${{ needs.terraform-staging.outputs.grafana_endpoint }}
      grafana_api_token: ${{ needs.terraform-staging.outputs.grafana_api_token }}
      elasticache_endpoint: ${{ needs.terraform-staging.outputs.elasticache_endpoint }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ---------------------------------------------------------------------------
  # PRODUCTION — requires manual approval in GitHub environment settings
  # ---------------------------------------------------------------------------
  terraform-production:
    needs: deploy-staging
    uses: ./.github/workflows/_terraform.yml
    with:
      environment: production
      workspace: production
      tfvars: envs/production.tfvars
      aws_region: eu-central-1
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

  deploy-production:
    needs: [terraform-production, build-frontend, build-productcatalogservice, build-currencyservice]
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: production
      aws_region: eu-central-1
      cluster_name: ${{ needs.terraform-production.outputs.cluster_name }}
      vpc_id: ${{ needs.terraform-production.outputs.vpc_id }}
      lb_controller_role_arn: ${{ needs.terraform-production.outputs.lb_controller_role_arn }}
      origin_acm_certificate_arn: ${{ needs.terraform-production.outputs.origin_acm_certificate_arn }}
      hostname: origin.shop.whiteforge.ai
      ecr_frontend_url: ${{ needs.terraform-production.outputs.ecr_frontend_url }}
      frontend_image_tag: ${{ needs.build-frontend.outputs.image_tag }}
      ecr_productcatalogservice_url: ${{ needs.terraform-production.outputs.ecr_productcatalogservice_url }}
      productcatalogservice_image_tag: ${{ needs.build-productcatalogservice.outputs.image_tag }}
      ecr_currencyservice_url: ${{ needs.terraform-production.outputs.ecr_currencyservice_url }}
      currencyservice_image_tag: ${{ needs.build-currencyservice.outputs.image_tag }}
      amp_endpoint: ${{ needs.terraform-production.outputs.amp_endpoint }}
      otel_collector_role_arn: ${{ needs.terraform-production.outputs.otel_collector_role_arn }}
      grafana_endpoint: ${{ needs.terraform-production.outputs.grafana_endpoint }}
      grafana_api_token: ${{ needs.terraform-production.outputs.grafana_api_token }}
      elasticache_endpoint: ${{ needs.terraform-production.outputs.elasticache_endpoint }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
