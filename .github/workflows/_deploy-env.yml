name: Deploy Environment

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws_region:
        required: true
        type: string
      cluster_name:
        required: true
        type: string
      vpc_id:
        required: true
        type: string
      lb_controller_role_arn:
        required: true
        type: string
      origin_acm_certificate_arn:
        required: true
        type: string
      hostname:
        required: true
        type: string
      ecr_frontend_url:
        required: true
        type: string
      frontend_image_tag:
        required: true
        type: string
      ecr_productcatalogservice_url:
        required: true
        type: string
      productcatalogservice_image_tag:
        required: true
        type: string
      ecr_currencyservice_url:
        required: true
        type: string
      currencyservice_image_tag:
        required: true
        type: string
      amp_endpoint:
        required: true
        type: string
      otel_collector_role_arn:
        required: true
        type: string
      grafana_endpoint:
        required: true
        type: string
      grafana_api_token:
        required: true
        type: string
      elasticache_endpoint:
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true

jobs:
  deploy:
    name: "Deploy (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ inputs.aws_region }} \
            --name ${{ inputs.cluster_name }}

      - name: Install AWS Load Balancer Controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update eks
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --values k8s/aws-load-balancer-controller/values.yaml \
            --set clusterName=${{ inputs.cluster_name }} \
            --set region=${{ inputs.aws_region }} \
            --set vpcId=${{ inputs.vpc_id }} \
            --set "serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn=${{ inputs.lb_controller_role_arn }}" \
            --wait

      - name: Install ExternalDNS
        run: |
          kubectl create secret generic cloudflare-api-token \
            --namespace kube-system \
            --from-literal=api-token=${{ secrets.CLOUDFLARE_API_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -
          helm repo add external-dns https://kubernetes-sigs.github.io/external-dns
          helm repo update external-dns
          helm upgrade --install external-dns external-dns/external-dns \
            --namespace kube-system \
            --values k8s/external-dns/values.yaml \
            --wait

      - name: Deploy app
        run: |
          helm upgrade --install test-app ./k8s/test-app \
            --namespace demo \
            --create-namespace \
            --values k8s/test-app/values.yaml \
            --set "frontend.image.repository=${{ inputs.ecr_frontend_url }}" \
            --set "frontend.image.tag=${{ inputs.frontend_image_tag }}" \
            --set "frontend.appEnv=${{ inputs.environment }}" \
            --set "productCatalogService.image.repository=${{ inputs.ecr_productcatalogservice_url }}" \
            --set "productCatalogService.image.tag=${{ inputs.productcatalogservice_image_tag }}" \
            --set "currencyService.image.repository=${{ inputs.ecr_currencyservice_url }}" \
            --set "currencyService.image.tag=${{ inputs.currencyservice_image_tag }}" \
            --set "ingress.annotations.alb\\.ingress\\.kubernetes\\.io/certificate-arn=${{ inputs.origin_acm_certificate_arn }}" \
            --set "ingress.hosts[0].host=${{ inputs.hostname }}" \
            --set "opentelemetryCollector.ampEndpoint=${{ inputs.amp_endpoint }}api/v1/remote_write" \
            --set "opentelemetryCollector.awsRegion=${{ inputs.aws_region }}" \
            --set "opentelemetryCollector.irsaRoleArn=${{ inputs.otel_collector_role_arn }}" \
            --set "cartDatabase.connectionString=${{ inputs.elasticache_endpoint }}:6379" \
            --wait --timeout 5m

      - name: Wait for ALB
        run: |
          for i in $(seq 1 30); do
            ALB=$(kubectl get ingress frontend -n default -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$ALB" ]; then
              echo "::notice::ALB endpoint (${{ inputs.environment }}): https://${ALB}"
              echo "::notice::ExternalDNS will create CNAME: ${{ inputs.hostname }} -> ${ALB}"
              break
            fi
            sleep 10
          done

      - name: Configure Grafana
        env:
          GRAFANA_URL: https://${{ inputs.grafana_endpoint }}
          GRAFANA_TOKEN: ${{ inputs.grafana_api_token }}
          AMP_ENDPOINT: ${{ inputs.amp_endpoint }}
          AWS_REGION_VAL: ${{ inputs.aws_region }}
        run: |
          # Helper: create or update datasource by name
          upsert_datasource() {
            local payload="$1"
            local ds_name
            ds_name=$(echo "$payload" | jq -r '.name')
            local encoded_name
            encoded_name=$(printf '%s' "$ds_name" | jq -sRr @uri)

            # Check if datasource already exists
            local existing
            existing=$(curl -sf "${GRAFANA_URL}/api/datasources/name/${encoded_name}" \
              -H "Authorization: Bearer ${GRAFANA_TOKEN}" 2>/dev/null) || true

            if echo "$existing" | jq -e '.id' >/dev/null 2>&1; then
              local ds_id
              ds_id=$(echo "$existing" | jq -r '.id')
              echo "Updating datasource '${ds_name}' (id=${ds_id})"
              curl -sf -X PUT "${GRAFANA_URL}/api/datasources/${ds_id}" \
                -H "Authorization: Bearer ${GRAFANA_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$payload"
            else
              echo "Creating datasource '${ds_name}'"
              curl -sf -X POST "${GRAFANA_URL}/api/datasources" \
                -H "Authorization: Bearer ${GRAFANA_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$payload"
            fi
          }

          # AMP datasource
          upsert_datasource '{
            "name": "Amazon Managed Prometheus",
            "type": "prometheus",
            "url": "'"${AMP_ENDPOINT}"'",
            "access": "proxy",
            "isDefault": true,
            "jsonData": {
              "httpMethod": "POST",
              "sigV4Auth": true,
              "sigV4AuthType": "default",
              "sigV4Region": "'"${AWS_REGION_VAL}"'"
            }
          }'

          # X-Ray datasource
          upsert_datasource '{
            "name": "AWS X-Ray",
            "type": "grafana-x-ray-datasource",
            "access": "proxy",
            "jsonData": {
              "defaultRegion": "'"${AWS_REGION_VAL}"'"
            }
          }'

          # Get Prometheus datasource UID for dashboard variable substitution
          DS_UID=$(curl -sf "${GRAFANA_URL}/api/datasources/name/Amazon%20Managed%20Prometheus" \
            -H "Authorization: Bearer ${GRAFANA_TOKEN}" | jq -r '.uid')

          # Import dashboards with datasource UID replaced
          for DASH_FILE in k8s/observability/grafana/dashboards/*.json; do
            if [ -f "$DASH_FILE" ]; then
              echo "Importing dashboard: $DASH_FILE"
              DASHBOARD=$(sed "s/\${DS_PROMETHEUS}/${DS_UID}/g" "$DASH_FILE")
              curl -sf -X POST "${GRAFANA_URL}/api/dashboards/db" \
                -H "Authorization: Bearer ${GRAFANA_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"dashboard\": ${DASHBOARD}, \"overwrite\": true}"
            fi
          done
